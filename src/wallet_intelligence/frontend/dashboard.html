<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wallet Intelligence Dashboard</title>
    <style>
        :root {
            --bg: #0a0a0f;
            --card: #12121a;
            --border: #1e1e2e;
            --text: #e0e0e8;
            --muted: #6b7280;
            --accent: #6366f1;
            --green: #22c55e;
            --red: #ef4444;
            --yellow: #eab308;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }
        .header {
            background: var(--card);
            border-bottom: 1px solid var(--border);
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 { font-size: 20px; font-weight: 600; }
        .header .status { display: flex; align-items: center; gap: 8px; }
        .header .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 16px;
            padding: 24px;
        }
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
        }
        .card h3 { font-size: 14px; color: var(--muted); margin-bottom: 8px; }
        .card .value { font-size: 28px; font-weight: 700; }
        .card .change { font-size: 13px; margin-top: 4px; }
        .card .change.up { color: var(--green); }
        .card .change.down { color: var(--red); }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 16px;
        }
        th, td {
            text-align: left;
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            font-size: 13px;
        }
        th { color: var(--muted); font-weight: 500; }
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 500;
        }
        .badge-whale { background: #312e81; color: #a5b4fc; }
        .badge-smart { background: #14532d; color: #86efac; }
        .badge-unknown { background: #1e1e2e; color: #6b7280; }
        .live-feed {
            max-height: 400px;
            overflow-y: auto;
            padding: 16px;
        }
        .feed-item {
            padding: 12px;
            border-bottom: 1px solid var(--border);
            font-size: 13px;
        }
        .feed-item .hash { color: var(--accent); font-family: monospace; }
        .feed-item .amount { font-weight: 600; }
        .feed-item .amount.large { color: var(--yellow); }
    </style>
</head>
<body>
    <div class="header">
        <h1>🔍 Wallet Intelligence</h1>
        <div class="status">
            <div class="dot"></div>
            <span>Live</span>
        </div>
    </div>

    <div class="grid">
        <div class="card">
            <h3>Tracked Wallets</h3>
            <div class="value" id="wallet-count">0</div>
            <div class="change up">+0 today</div>
        </div>
        <div class="card">
            <h3>Whale Transactions (24h)</h3>
            <div class="value" id="whale-count">0</div>
            <div class="change">>$100K transfers</div>
        </div>
        <div class="card">
            <h3>Total Volume (24h)</h3>
            <div class="value" id="total-volume">$0</div>
            <div class="change">across all chains</div>
        </div>
        <div class="card">
            <h3>Active Alerts</h3>
            <div class="value" id="alert-count">0</div>
            <div class="change">monitoring</div>
        </div>
    </div>

    <div style="padding: 0 24px;">
        <div class="card">
            <h3>🐋 Recent Whale Transactions</h3>
            <table>
                <thead>
                    <tr>
                        <th>Chain</th>
                        <th>From</th>
                        <th>To</th>
                        <th>Amount</th>
                        <th>Time</th>
                        <th>Type</th>
                    </tr>
                </thead>
                <tbody id="whale-table">
                </tbody>
            </table>
        </div>

        <div class="card" style="margin-top: 16px;">
            <h3>📡 Live Transaction Feed</h3>
            <div class="live-feed" id="live-feed">
                <div class="feed-item" style="color: var(--muted);">Connecting...</div>
            </div>
        </div>
    </div>

    <script>
        const API = window.location.origin;
        let ws;

        async function fetchStats() {
            try {
                const [whales, wallets] = await Promise.all([
                    fetch(`${API}/api/v1/whales?limit=10`).then(r => r.json()),
                    fetch(`${API}/api/v1/wallets?limit=1`).then(r => r.json()),
                ]);

                document.getElementById('whale-count').textContent = whales.length;
                document.getElementById('wallet-count').textContent = wallets.length || '—';

                const tbody = document.getElementById('whale-table');
                tbody.innerHTML = whales.map(tx => `
                    <tr>
                        <td>${tx.chain}</td>
                        <td><code>${tx.from_address.slice(0,8)}...${tx.from_address.slice(-6)}</code></td>
                        <td><code>${tx.to_address.slice(0,8)}...${tx.to_address.slice(-6)}</code></td>
                        <td class="amount ${tx.value_usd > 500000 ? 'large' : ''}">$${Number(tx.value_usd).toLocaleString()}</td>
                        <td>${new Date(tx.timestamp).toLocaleTimeString()}</td>
                        <td>${tx.classification || '—'}</td>
                    </tr>
                `).join('');
            } catch (e) {
                console.error('Fetch error:', e);
            }
        }

        function connectWS() {
            const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${proto}//${location.host}/ws/live`);

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.event === 'heartbeat') return;

                const feed = document.getElementById('live-feed');
                const item = document.createElement('div');
                item.className = 'feed-item';
                item.innerHTML = `
                    <span class="hash">${data.data?.tx_hash?.slice(0,16) || '—'}...</span>
                    <span class="amount ${data.data?.value_usd > 100000 ? 'large' : ''}">
                        $${Number(data.data?.value_usd || 0).toLocaleString()}
                    </span>
                    on ${data.data?.chain || '?'}
                `;
                feed.insertBefore(item, feed.firstChild);
                if (feed.children.length > 100) feed.removeChild(feed.lastChild);
            };

            ws.onclose = () => setTimeout(connectWS, 3000);
        }

        fetchStats();
        setInterval(fetchStats, 30000);
        connectWS();
    </script>
</body>
</html>
